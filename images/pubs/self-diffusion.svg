<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Self-diffusion recovers a clean signal from a degraded measurement without pre-training">
  <defs>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#64748b"/></marker>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="600" height="300" rx="10" fill="#f8fafc"/>
  <rect x="30" y="70" width="150" height="150" rx="6" fill="#fff" stroke="#cbd5e1"/>
  <g filter="url(#blur)" opacity=".85">
    <circle cx="90" cy="130" r="30" fill="#2563eb"/>
    <rect x="105" y="140" width="55" height="46" rx="6" fill="#0d9488"/>
  </g>
  <g fill="#94a3b8" opacity=".55">
    <circle cx="52" cy="92" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="70" cy="196" r="2"/>
    <circle cx="160" cy="188" r="2"/><circle cx="120" cy="86" r="2"/><circle cx="44" cy="160" r="2"/>
  </g>
  <text x="105" y="243" font-size="17" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif">Degraded measurement</text>
  <path d="M188,145 L228,145" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#c)"/>
  <circle cx="300" cy="145" r="54" fill="#7c3aed" opacity=".10"/>
  <path d="M300,97 A48,48 0 1 1 258,170" fill="none" stroke="#7c3aed" stroke-width="2.6" marker-end="url(#c)"/>
  <text x="300" y="140" font-size="18" text-anchor="middle" fill="#5b21b6" font-family="system-ui,sans-serif" font-weight="600">Self-</text>
  <text x="300" y="162" font-size="18" text-anchor="middle" fill="#5b21b6" font-family="system-ui,sans-serif" font-weight="600">diffusion</text>
  <text x="300" y="232" font-size="15" text-anchor="middle" fill="#7c3aed" font-family="system-ui,sans-serif">no pre-training</text>
  <path d="M372,145 L412,145" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#c)"/>
  <rect x="420" y="70" width="150" height="150" rx="6" fill="#fff" stroke="#cbd5e1"/>
  <circle cx="480" cy="130" r="30" fill="#2563eb"/>
  <rect x="495" y="140" width="55" height="46" rx="6" fill="#0d9488"/>
  <text x="495" y="243" font-size="17" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif">Recovered signal</text>
</svg>
